<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>销售和交付管理系统</title>
    <style>
      .ant-table-thead > tr > th {
        background: #f0f4ff !important;
        color: #2c3e6b !important;
        font-weight: 700 !important;
        font-size: 12px !important;
        padding: 10px 14px !important;
        border-bottom: 2px solid #d6e0f0 !important;
        letter-spacing: 0.5px !important;
        text-transform: uppercase !important;
      }
      .ant-table-thead > tr > th::before { display: none !important; }
      .ant-table-tbody > tr > td {
        padding: 10px 14px !important;
        font-size: 13px !important;
        color: #3a4a6a !important;
        border-bottom: 1px solid #eef2f7 !important;
        transition: all 0.15s ease !important;
      }
      .ant-table-tbody > tr:nth-child(even) > td {
        background: #f8faff !important;
      }
      .ant-table-tbody > tr:hover > td {
        background: #edf3ff !important;
      }
      .ant-table-tbody > tr:last-child > td { border-bottom: none !important; }
      .ant-table-tbody .ant-tag {
        font-size: 12px !important; padding: 1px 10px !important;
        line-height: 22px !important; border-radius: 4px !important; border: none !important;
      }
      .ant-table-tbody .ant-btn-text {
        color: #5a6d8a !important; transition: color 0.15s !important;
      }
      .ant-table-tbody .ant-btn-text:hover { color: #2c3e6b !important; }
      .ant-table-cell { white-space: nowrap !important; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
